version: "2"

linters:
  enable:
    - gocyclo
    - gocognit
    - funlen
    - nestif
    - dupl
    - goclocbudget

  settings:
    gocyclo:
      min-complexity: 12

    gocognit:
      min-complexity: 15

    funlen:
      lines: 80
      statements: 50
      ignore-comments: true

    nestif:
      min-complexity: 5

    dupl:
      threshold: 100

    custom:
      goclocbudget:
        type: "module"
        description: "Enforces the implementation Go LOC budget using gocloc."
        settings:
          max-go-code-lines: 10000
          include-tests: false
          exclude-generated: true
          exclude-dirs:
            - vendor
            - .git
            - node_modules
            - webui/dist
