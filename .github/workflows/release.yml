name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Prerelease SemVer tag (for example v0.1.0-alpha.1)
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Require main
        run: |
          test "$GITHUB_REF" = refs/heads/main || {
            echo "Releases must run from main, got $GITHUB_REF" >&2
            exit 1
          }
          [[ "$RELEASE_VERSION" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]] || {
            echo "Release version must be prerelease SemVer prefixed with v" >&2
            exit 1
          }
          if gh release view "$RELEASE_VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $RELEASE_VERSION already exists" >&2
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version }}

      - name: Require passing main pipeline
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for check in Test Lint; do
            conclusion=$(gh api "repos/$GITHUB_REPOSITORY/commits/$GITHUB_SHA/check-runs" \
              --jq --arg name "$check" \
              '[.check_runs[] | select(.name == $name)] | sort_by(.started_at) | last | .conclusion // "missing"')
            if [[ "$conclusion" != "success" ]]; then
              echo "$check on $GITHUB_SHA is not successful (got: $conclusion)" >&2
              exit 1
            fi
          done

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Reject existing tag
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_VERSION" >/dev/null 2>&1; then
            echo "Tag $RELEASE_VERSION already exists" >&2
            exit 1
          fi

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          package-manager-cache: false

      - name: Verify web UI
        run: |
          corepack enable
          corepack prepare pnpm@10.22.0 --activate
          cd webui
          pnpm install --frozen-lockfile
          pnpm run verify:web

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Verify Go
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4
          make custom-golangci-lint
          make test
          make lint

      - name: Package release
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          commit_time=$(git show -s --format=%cI "$GITHUB_SHA")
          scripts/package-release.sh "$RELEASE_VERSION" "$GITHUB_SHA" "$commit_time"

      - name: Smoke-test release
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          smoke_dir=$(mktemp -d)
          tar -C "$smoke_dir" -xzf "dist/release/llamarig_${RELEASE_VERSION}_linux_amd64.tar.gz"
          binary="$smoke_dir/llamarig_${RELEASE_VERSION}_linux_amd64/llamarig"
          "$binary" version
          "$binary" version --json | jq -e --arg version "$RELEASE_VERSION" --arg commit "$GITHUB_SHA" \
            '.version == $version and .commit == $commit'
          cd dist/release
          sha256sum --check SHA256SUMS

      - name: Publish GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          gh release create "$RELEASE_VERSION" dist/release/* \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_VERSION" \
            --generate-notes \
            --draft
          gh release edit "$RELEASE_VERSION" --repo "$GITHUB_REPOSITORY" --draft=false --prerelease
