# Mirrors the GitHub Actions "live-e2e" job.
#
# Requires a Woodpecker secret named "github_token" (a token with read access
# to this repo) so check-draft can query the PR's draft state.
#
# Caches the downloaded llama.cpp binary on the agent host across builds via
# a bind-mounted volume, equivalent to actions/cache. This requires the
# Woodpecker agent/server to allow this host path (WOODPECKER_BACKEND_DOCKER_VOLUMES
# allowlist, or trusted repo settings) since arbitrary host volume mounts are
# disabled by default for security.
when:
  - event: pull_request
    branch: main


steps:
  check-draft:
    image: curlimages/curl:8.11.1
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - |
        if [ -n "$CI_COMMIT_PULL_REQUEST" ]; then
          curl -fsSL -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/$CI_REPO/pulls/$CI_COMMIT_PULL_REQUEST" \
            | grep -o '"draft":[a-z ]*' | grep -o '[a-z]*$' > draft.flag
        else
          echo false > draft.flag
        fi
        echo "draft=$(cat draft.flag)"

  webui-build:
    image: node:24
    volumes:
      - /var/cache/llamarig/pnpm/store:/pnpm/store
    commands:
      - if [ "$(cat draft.flag)" = "true" ]; then echo "Draft PR, skipping"; exit 0; fi
      - corepack enable
      - corepack prepare pnpm@10.22.0 --activate
      - pnpm config set store-dir /pnpm/store
      - cd webui
      - pnpm install --frozen-lockfile
      - pnpm run build

  e2e:
    image: golang:1.26
    volumes:
      - /var/cache/llamarig/e2e/llama.cpp:/root/.cache/llamarig/e2e/llama.cpp
      - /var/cache/llamarig/go/pkg/mod:/go/pkg/mod
      - /var/cache/llamarig/go/build:/root/.cache/go-build
    commands:
      - if [ "$(cat draft.flag)" = "true" ]; then echo "Draft PR, skipping"; exit 0; fi
      - make e2e-live
