// Navigation stack of nodes from root to current view.
let stack=[root];
const current=()=>stack[stack.length-1];

function countFiles(n){ if(n.isFile) return 1; return (n.children||[]).reduce((s,c)=>s+countFiles(c),0); }

const totalFiles=countFiles(root);
document.querySelector('#title').textContent=`Go code metrics — ${root.name}`;
document.querySelector('#summary').textContent=
  `${totalFiles} files · ${root.code} code lines · complexity ${root.complexity}`;

function densityColor(n){
  const d=n.code?n.complexity/n.code:0;
  return `hsl(${Math.max(0,130-d*900)} 55% 28%)`;
}

function render(){
  const node=current();
  renderCrumbs();
  const tree=document.querySelector('#tree');
  tree.innerHTML='';
  const children=(node.children||[]).slice().sort((a,b)=>b.code-a.code);
  if(!children.length){ tree.innerHTML='<div class="empty">No entries.</div>'; return; }
  const max=children.reduce((m,c)=>Math.max(m,c.code),1);
  for(const c of children){
    const el=document.createElement(c.isFile?'section':'button');
    el.className='tile '+(c.isFile?'file':'dir');
    el.style.flexGrow=Math.max(c.code,1);
    el.style.flexBasis=`${Math.max(130,520*c.code/max)}px`;
    el.style.background=densityColor(c);
    el.title=c.path||c.name;
    const icon=c.isFile?'📄':'📁';
    const files=c.isFile?'':` · ${countFiles(c)} files`;
    el.innerHTML=`<div class="name"><span class="icon">${icon}</span><span></span></div>`+
      `<div class="stats">${c.code} loc · c${c.complexity} · max ${c.maxComplexity}${files}</div>`;
    el.querySelector('.name span:last-child').textContent=c.name;
    if(!c.isFile) el.addEventListener('click',()=>{ stack.push(c); render(); });
    tree.appendChild(el);
  }
}

function renderCrumbs(){
  const c=document.querySelector('#crumbs');
  c.innerHTML='';
  stack.forEach((n,i)=>{
    if(i) c.insertAdjacentHTML('beforeend','<span class="sep">/</span>');
    const b=document.createElement('button');
    b.textContent=n.name;
    b.addEventListener('click',()=>{ stack=stack.slice(0,i+1); render(); });
    c.appendChild(b);
  });
}

render();
</script>
